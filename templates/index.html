<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Generator</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Text Generator</h1>
      <p>Enter a prompt and generate text using GPT-2.</p>
      <textarea id="prompt" placeholder="Write your prompt here..."></textarea>
      <button id="generateButton">Generate</button>
      <div id="status"></div>
      <div class="output-panel">
        <h2>Generated Text</h2>
        <pre id="output"></pre>
      </div>
    </div>
    <script>
      const promptField = document.getElementById('prompt');
      const generateButton = document.getElementById('generateButton');
      const outputField = document.getElementById('output');
      const statusField = document.getElementById('status');

      async function generateText() {
        const prompt = promptField.value.trim();
        if (!prompt) {
          statusField.textContent = 'Please enter a prompt.';
          return;
        }

        outputField.textContent = '';
        statusField.textContent = 'Generating...';
        generateButton.disabled = true;

        try {
          const response = await fetch('/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt })
          });

          if (!response.ok) {
            const errorData = await response.json();
            statusField.textContent = errorData.error || 'Generation failed.';
            return;
          }

          const data = await response.json();
          outputField.textContent = data.generated_text;
          statusField.textContent = 'Done.';
        } catch (error) {
          statusField.textContent = 'Error generating text. Check the server logs.';
          console.error(error);
        } finally {
          generateButton.disabled = false;
        }
      }

      generateButton.addEventListener('click', generateText);
      promptField.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && event.shiftKey) {
          event.preventDefault();
          generateText();
        }
      });
    </script>
  </body>
</html>
